<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <title>Search Product</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }

      body {
        background-color: #000;
        color: #f0f0f0;
        padding-top: 56px;
        min-height: 100vh;
      }

      /* ── Search Hero ── */
      .search-hero {
        padding: 80px 16px 40px;
        text-align: center;
      }

      .search-hero h1 {
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }

      .search-hero p {
        color: #888;
        margin-bottom: 32px;
        font-size: 1rem;
      }

      /* ── Search Bar ── */
      .search-wrapper {
        position: relative;
        max-width: 620px;
        margin: 0 auto;
      }

      .search-bar-row {
        display: flex;
        gap: 0;
        border: 2px solid #333;
        border-radius: 50px;
        overflow: visible;
        background: #111;
        transition: border-color 0.2s;
      }

      .search-bar-row:focus-within {
        border-color: #28a745;
      }

      #searchInput {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: #fff;
        font-size: 1.05rem;
        padding: 14px 22px;
        border-radius: 50px 0 0 50px;
      }

      #searchInput::placeholder {
        color: #555;
      }

      #searchBtn {
        background: #28a745;
        border: none;
        color: #fff;
        padding: 0 28px;
        border-radius: 0 50px 50px 0;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }

      #searchBtn:hover {
        background: #218838;
      }

      /* ── Autocomplete Dropdown ── */
      #suggestions {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        overflow: hidden;
        z-index: 999;
        box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        display: none;
      }

      .suggestion-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        cursor: pointer;
        transition: background 0.15s;
        color: #e0e0e0;
        font-size: 0.95rem;
      }

      .suggestion-item:hover,
      .suggestion-item.active {
        background: #262626;
        color: #fff;
      }

      .suggestion-item img {
        width: 36px;
        height: 36px;
        object-fit: contain;
        border-radius: 6px;
        background: #111;
        flex-shrink: 0;
      }

      /* ── Result Card ── */
      #resultArea {
        max-width: 700px;
        margin: 48px auto 60px;
        padding: 0 16px;
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 0.35s ease, transform 0.35s ease;
        pointer-events: none;
      }

      #resultArea.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .product-card {
        background: #111;
        border: 1px solid #2a2a2a;
        border-radius: 16px;
        display: flex;
        overflow: hidden;
        gap: 0;
      }

      .product-card-img {
        width: 220px;
        min-width: 220px;
        background: #0d0d0d;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .product-card-img img {
        width: 100%;
        max-height: 200px;
        object-fit: contain;
      }

      .product-card-body {
        padding: 28px 32px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .product-card-body h2 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 12px;
      }

      .product-card-body p {
        color: #aaa;
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      .product-price {
        font-size: 1.4rem;
        font-weight: 700;
        color: #28a745;
      }

      /* ── Not found ── */
      #notFound {
        display: none;
        text-align: center;
        color: #666;
        margin-top: 48px;
      }

      #notFound .icon {
        font-size: 3rem;
        margin-bottom: 12px;
      }

      #notFound p {
        font-size: 1rem;
      }

      /* ── Responsive ── */
      @media (max-width: 540px) {
        .product-card {
          flex-direction: column;
        }
        .product-card-img {
          width: 100%;
          min-width: unset;
          padding: 24px 40px;
        }
      }
    </style>
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark fixed-top">
      <ul class="navbar-nav">
        <li class="nav-item">
          <img class="navbar-brand" src="Energizer_Sport_Logo.png" alt="Energizer Sport Logo" style="width:100px" />
        </li>
        <li class="nav-item">
          <a class="nav-link" href="home">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="our-products">Our Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-active" href="search">Search Product</a>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="buy">Buy</a>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="cart">My Cart <span class="badge badge-success ml-1" id="cartBadge"></span></a>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="orders">My Orders</a>
        </li>
        <li class="nav-item admin-only" style="display:none">
          <a class="nav-link" href="/manage">Admin Panel</a>
        </li>
      </ul>
      <ul class="navbar-nav ml-auto">
        <li class="nav-item auth-only" style="display:none">
          <span class="nav-link" style="color:rgba(255,255,255,0.5);cursor:default;">
            Welcome, <strong id="navUsername" style="color:#fff;"></strong>
          </span>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="logout">Logout</a>
        </li>
        <li class="nav-item guest-only" style="display:none">
          <a class="nav-link" href="login">Login</a>
        </li>
        <li class="nav-item guest-only" style="display:none">
          <a class="nav-link" href="register">Register</a>
        </li>
      </ul>
    </nav>

    <!-- Search Hero -->
    <div class="search-hero">
      <h1>Find a Product</h1>
      <p>Type a product name to search our catalog</p>

      <div class="search-wrapper">
        <div class="search-bar-row">
          <input
            type="text"
            id="searchInput"
            placeholder="e.g. Creatine, Protein..."
            autocomplete="off"
          />
          <button id="searchBtn" onclick="runSearch()">Search</button>
        </div>
        <div id="suggestions"></div>
      </div>
    </div>

    <!-- Not found message -->
    <div id="notFound">
      <div class="icon">&#128269;</div>
      <p>No product found for "<span id="notFoundTerm"></span>"</p>
    </div>

    <!-- Result Card -->
    <div id="resultArea">
      <div class="product-card">
        <div class="product-card-img">
          <img id="cardImg" src="" alt="Product image" />
        </div>
        <div class="product-card-body">
          <h2 id="cardTitle"></h2>
          <p id="cardDesc"></p>
          <div class="product-price" id="cardPrice"></div>
        </div>
      </div>
    </div>

    <script>
      const searchInput  = document.getElementById("searchInput");
      const suggestionsBox = document.getElementById("suggestions");
      const resultArea   = document.getElementById("resultArea");
      const notFound     = document.getElementById("notFound");

      let debounceTimer = null;
      let activeIndex   = -1;
      let currentSuggestions = [];

      // ── Live suggestions ──
      searchInput.addEventListener("input", () => {
        clearTimeout(debounceTimer);
        const q = searchInput.value.trim();
        if (!q) { closeSuggestions(); return; }
        debounceTimer = setTimeout(() => fetchSuggestions(q), 150);
      });

      searchInput.addEventListener("keydown", (e) => {
        const items = suggestionsBox.querySelectorAll(".suggestion-item");
        if (!items.length) {
          if (e.key === "Enter") runSearch();
          return;
        }
        if (e.key === "ArrowDown") {
          e.preventDefault();
          activeIndex = Math.min(activeIndex + 1, items.length - 1);
          updateActive(items);
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          activeIndex = Math.max(activeIndex - 1, -1);
          updateActive(items);
        } else if (e.key === "Enter") {
          e.preventDefault();
          if (activeIndex >= 0) items[activeIndex].click();
          else runSearch();
        } else if (e.key === "Escape") {
          closeSuggestions();
        }
      });

      function updateActive(items) {
        items.forEach((el, i) => el.classList.toggle("active", i === activeIndex));
        if (activeIndex >= 0) searchInput.value = currentSuggestions[activeIndex].title;
      }

      async function fetchSuggestions(q) {
        const res = await fetch("/api/products/search?q=" + encodeURIComponent(q));
        const data = await res.json();
        currentSuggestions = data;
        activeIndex = -1;

        if (!data.length) { closeSuggestions(); return; }

        suggestionsBox.innerHTML = data.map((p, i) =>
          `<div class="suggestion-item" data-index="${i}">
            <img src="${p.image}" onerror="this.style.display='none'" />
            ${escapeHtml(p.title)}
          </div>`
        ).join("");

        suggestionsBox.querySelectorAll(".suggestion-item").forEach((el) => {
          el.addEventListener("click", () => {
            searchInput.value = currentSuggestions[el.dataset.index].title;
            closeSuggestions();
            runSearch();
          });
        });

        suggestionsBox.style.display = "block";
      }

      function closeSuggestions() {
        suggestionsBox.style.display = "none";
        suggestionsBox.innerHTML = "";
        activeIndex = -1;
      }

      document.addEventListener("click", (e) => {
        if (!e.target.closest(".search-wrapper")) closeSuggestions();
      });

      // ── Full search ──
      async function runSearch() {
        const q = searchInput.value.trim();
        if (!q) return;
        closeSuggestions();

        const res  = await fetch("/process_detail?title=" + encodeURIComponent(q));
        const data = await res.json();

        resultArea.classList.remove("visible");
        notFound.style.display = "none";

        if (!data.title) {
          document.getElementById("notFoundTerm").textContent = q;
          notFound.style.display = "block";
          return;
        }

        document.getElementById("cardImg").src   = data.image || "";
        document.getElementById("cardTitle").textContent = data.title;
        document.getElementById("cardDesc").textContent  = data.description || "";
        document.getElementById("cardPrice").textContent = data.price != null
          ? data.price.toLocaleString("en-US", { style: "currency", currency: "SAR", minimumFractionDigits: 2 })
          : "";

        void resultArea.offsetWidth;
        resultArea.classList.add("visible");
      }

      function escapeHtml(str) {
        return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }
    </script>

    <script>
      (function() {
        var count = JSON.parse(localStorage.getItem('energizerCart') || '[]')
          .reduce(function(s, i) { return s + i.quantity; }, 0);
        var b = document.getElementById('cartBadge');
        if (b) b.textContent = count > 0 ? count : '';
      })();

      fetch("/api/session")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var show = data.loggedIn ? ".auth-only" : ".guest-only";
          document.querySelectorAll(show).forEach(function(el) { el.style.display = ""; });
          if (data.loggedIn && data.username) {
            var el = document.getElementById("navUsername");
            if (el) el.textContent = data.username;
          }
          if (data.role === "admin") {
            document.querySelectorAll(".admin-only").forEach(function(el) { el.style.display = ""; });
          }
        });
    </script>
  </body>
</html>
