<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Energizer Sport</title>
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <style>
      * {
        box-sizing: border-box;
        font-family:
          "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }

      body {
        background-image: url("background_pagelogin.png");
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .auth-card {
        background-color: rgba(0, 0, 0, 0.75);
        color: #e0e0e0;
        padding: 36px 32px;
        width: 380px;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      }

      .auth-card .logo {
        display: block;
        margin: 0 auto 20px;
        width: 100px;
      }

      .auth-card h2 {
        text-align: center;
        color: #fff;
        margin-bottom: 24px;
        font-size: 1.6rem;
        letter-spacing: 0.5px;
      }

      .auth-card label {
        color: #ccc;
        font-size: 0.9rem;
        margin-bottom: 4px;
      }

      .auth-card .form-control {
        background-color: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #fff;
        border-radius: 6px;
      }

      .auth-card .form-control:focus {
        background-color: rgba(255, 255, 255, 0.15);
        border-color: #5cb85c;
        color: #fff;
        box-shadow: 0 0 0 0.2rem rgba(92, 184, 92, 0.25);
      }

      .auth-card .form-control::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      .auth-card .btn-success {
        background-color: #3d8b3d;
        border-color: #3d8b3d;
        font-size: 1rem;
        padding: 10px;
        letter-spacing: 0.5px;
      }

      .auth-card .btn-success:hover {
        background-color: #2e6b2e;
        border-color: #2e6b2e;
      }

      .auth-card .auth-footer {
        text-align: center;
        margin-top: 18px;
        font-size: 0.88rem;
        color: #aaa;
      }

      .auth-card .auth-footer a {
        color: #5cb85c;
        text-decoration: none;
      }

      .auth-card .auth-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <img
        class="logo"
        src="Energizer_Sport_Logo.png"
        alt="Energizer Sport Logo"
      />
      <h2>Login</h2>
      <form name="LoginForm" id="LoginForm" action="loginprocess" method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            class="form-control"
            placeholder="Username"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            placeholder="Password"
            required
          />
        </div>
        <input type="hidden" name="next" id="nextUrl" value="" />
        <p
          id="errorMsg"
          class="text-danger text-center"
          style="min-height: 1.2em; font-size: 0.9rem"
        ></p>
        <button type="submit" class="btn btn-success btn-block">Login</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="register">Register here</a>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      if (params.get("error") === "invalid") {
        document.getElementById("errorMsg").textContent =
          "Incorrect username or password.";
      }
      const next = params.get("next");
      if (next) document.getElementById("nextUrl").value = next;
    </script>
  </body>
</html>
