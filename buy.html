<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout – Energizer Sport</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }

      body {
        background-color: #0d0d0d;
        color: #e0e0e0;
        padding-top: 56px;
      }

      /* ── Navbar active ── */
      .navbar-dark .nav-link.nav-active { color: #28a745 !important; }

      /* ── Page hero ── */
      .page-hero {
        background: linear-gradient(135deg, #0a1a0a, #111);
        border-bottom: 2px solid #28a745;
        padding: 40px 20px 28px;
        text-align: center;
      }
      .page-hero h1 { color: #fff; font-size: 1.9rem; font-weight: 700; margin-bottom: 4px; }
      .page-hero p  { color: #666; margin: 0; }

      /* ── Panel card ── */
      .panel {
        background: #111;
        border: 1px solid #1e1e1e;
        border-radius: 14px;
        padding: 28px;
        margin-bottom: 24px;
      }
      .panel h5 {
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid #1e1e1e;
      }

      /* ── Cart summary rows ── */
      .summary-item {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 0;
        border-bottom: 1px solid #191919;
      }
      .summary-item:last-child { border-bottom: none; }
      .summary-item-img {
        width: 52px;
        height: 52px;
        min-width: 52px;
        background: #0a0a0a;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .summary-item-img img { max-width: 48px; max-height: 48px; object-fit: contain; }
      .summary-item-name  { flex: 1; color: #ccc; font-size: 0.9rem; }
      .summary-item-qty   { color: #666; font-size: 0.82rem; }
      .summary-item-price { color: #28a745; font-size: 0.9rem; font-weight: 600; white-space: nowrap; }

      /* ── Total row ── */
      .total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #1e1e1e;
        font-size: 1.15rem;
        font-weight: 700;
        color: #fff;
      }
      .total-row span:last-child { color: #28a745; }

      /* ── Payment form ── */
      .panel label { color: #aaa; font-size: 0.88rem; margin-bottom: 4px; }

      .panel .form-control {
        background: rgba(255,255,255,0.06);
        border: 1px solid #2a2a2a;
        color: #e0e0e0;
        border-radius: 8px;
      }
      .panel .form-control:focus {
        background: rgba(255,255,255,0.09);
        border-color: #28a745;
        color: #fff;
        box-shadow: 0 0 0 0.15rem rgba(40,167,69,0.2);
      }
      .panel textarea.form-control { resize: none; }

      /* ── Radio payment ── */
      .payment-option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        cursor: pointer;
        margin-bottom: 10px;
        transition: border-color 0.2s, background 0.2s;
        color: #ccc;
        font-size: 0.92rem;
      }
      .payment-option:hover { border-color: #28a745; background: rgba(40,167,69,0.05); }
      .payment-option input[type="radio"] { accent-color: #28a745; width: 16px; height: 16px; }

      /* ── Submit button ── */
      .btn-submit {
        background: #28a745;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 13px;
        font-size: 1rem;
        font-weight: 600;
        width: 100%;
        cursor: pointer;
        letter-spacing: 0.3px;
        margin-top: 8px;
        transition: background 0.2s, transform 0.1s;
      }
      .btn-submit:hover  { background: #218838; }
      .btn-submit:active { transform: scale(0.98); }
    </style>
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark fixed-top">
      <ul class="navbar-nav">
        <li class="nav-item">
          <img class="navbar-brand" src="Energizer_Sport_Logo.png" alt="Energizer Sport Logo" style="width:100px" />
        </li>
        <li class="nav-item">
          <a class="nav-link" href="home">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="our-products">Our Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="search">Search Product</a>
        </li>
        <li class="nav-item active auth-only" style="display:none">
          <a class="nav-link nav-active" href="buy">Buy</a>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="cart">My Cart <span class="badge badge-success ml-1" id="cartBadge"></span></a>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="orders">My Orders</a>
        </li>
        <li class="nav-item admin-only" style="display:none">
          <a class="nav-link" href="/manage">Admin Panel</a>
        </li>
      </ul>
      <ul class="navbar-nav ml-auto">
        <li class="nav-item auth-only" style="display:none">
          <span class="nav-link" style="color:rgba(255,255,255,0.5);cursor:default;">
            Welcome, <strong id="navUsername" style="color:#fff;"></strong>
          </span>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="logout">Logout</a>
        </li>
        <li class="nav-item guest-only" style="display:none">
          <a class="nav-link" href="login">Login</a>
        </li>
        <li class="nav-item guest-only" style="display:none">
          <a class="nav-link" href="register">Register</a>
        </li>
      </ul>
    </nav>

    <!-- Page hero -->
    <div class="page-hero">
      <h1>Checkout</h1>
      <p>Review your order and complete your purchase</p>
    </div>

    <!-- Main -->
    <div class="container mt-4 mb-5">
      <div class="row">

        <!-- Left: Order summary -->
        <div class="col-lg-7">
          <div class="panel">
            <h5>Order Summary</h5>
            <div id="cartSummaryItems"></div>
            <div class="total-row">
              <span>Total</span>
              <span id="totalDisplay">SAR 0.00</span>
            </div>
          </div>
        </div>

        <!-- Right: Payment form -->
        <div class="col-lg-5">
          <div class="panel">
            <h5>Payment</h5>

            <div class="form-group">
              <label>Payment Method</label>
              <label class="payment-option">
                <input type="radio" name="payment" value="Credit Card" checked />
                Credit Card
              </label>
              <label class="payment-option">
                <input type="radio" name="payment" value="Debit Card" />
                Debit Card
              </label>
            </div>

            <div class="form-group">
              <label for="note">Order Note <span style="color:#555;font-size:0.8rem;">(optional)</span></label>
              <textarea id="note" class="form-control" rows="3" placeholder="Any special instructions…"></textarea>
            </div>

            <button class="btn-submit" onclick="confirmPurchase()">Confirm &amp; Pay</button>
            <div class="text-center mt-3">
              <a href="cart" style="color:#555;font-size:0.85rem;">&#8592; Back to cart</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>
      function getCart() {
        return JSON.parse(localStorage.getItem('energizerCart') || '[]');
      }
      function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      function updateNavBadge() {
        var count = getCart().reduce(function(s, i) { return s + i.quantity; }, 0);
        var b = document.getElementById('cartBadge');
        if (b) b.textContent = count > 0 ? count : '';
      }

      function renderSummary() {
        var cart = getCart();
        var total = parseFloat(localStorage.getItem('cartTotal') || '0');

        /* Recalculate from cart if available */
        if (cart.length) {
          total = cart.reduce(function(s, i) { return s + (i.price * i.quantity); }, 0);
        }

        var html = cart.length
          ? cart.map(function(item) {
              return '<div class="summary-item">' +
                '<div class="summary-item-img">' +
                  '<img src="' + esc(item.image || '') + '" alt="' + esc(item.title) + '" onerror="this.style.opacity=\'0\'" />' +
                '</div>' +
                '<div class="summary-item-name">' +
                  esc(item.title) +
                  '<div class="summary-item-qty">Qty: ' + item.quantity + '</div>' +
                '</div>' +
                '<div class="summary-item-price">SAR ' + (item.price * item.quantity).toFixed(2) + '</div>' +
              '</div>';
            }).join('')
          : '<p style="color:#555;font-size:0.9rem;">No items in cart.</p>';

        document.getElementById('cartSummaryItems').innerHTML = html;
        document.getElementById('totalDisplay').textContent = 'SAR ' + total.toFixed(2);
        updateNavBadge();
      }

      function confirmPurchase() {
        var cart = getCart();
        if (!cart.length) {
          Swal.fire({ icon: 'warning', title: 'Empty cart', text: 'Your cart is empty. Add products first.' });
          return;
        }
        var total = cart.reduce(function(s, i) { return s + (i.price * i.quantity); }, 0);
        var paymentType = document.querySelector('input[name="payment"]:checked').value;

        Swal.fire({
          title: 'Confirm Purchase',
          text: 'Total: SAR ' + total.toFixed(2) + ' via ' + paymentType + '. Proceed?',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#28a745',
          confirmButtonText: 'Yes, confirm',
          background: '#111',
          color: '#e0e0e0',
        }).then(function(result) {
          if (result.isConfirmed) postOrder(total, paymentType);
        });
      }

      function postOrder(total, paymentType) {
        var note = document.getElementById('note').value;

        fetch('/process_buy', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ total: total.toFixed(2), note: note, paymentType: paymentType }),
        })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.message) {
              /* Clear cart on success */
              localStorage.removeItem('energizerCart');
              localStorage.removeItem('cartTotal');
              Swal.fire({
                icon: 'success',
                title: 'Order Placed!',
                text: data.message,
                background: '#111',
                color: '#e0e0e0',
                confirmButtonColor: '#28a745',
              }).then(function() {
                window.location.href = '/home';
              });
            } else if (data.error) {
              Swal.fire({ icon: 'error', title: 'Error', text: data.error });
            }
          })
          .catch(function() {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Network or server issue. Please try again.' });
          });
      }

      renderSummary();
    </script>

    <script>
      fetch("/api/session")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var show = data.loggedIn ? ".auth-only" : ".guest-only";
          document.querySelectorAll(show).forEach(function(el) { el.style.display = ""; });
          if (data.loggedIn && data.username) {
            var el = document.getElementById("navUsername");
            if (el) el.textContent = data.username;
          }
          if (data.role === "admin") {
            document.querySelectorAll(".admin-only").forEach(function(el) { el.style.display = ""; });
          }
        });
    </script>
  </body>
</html>
