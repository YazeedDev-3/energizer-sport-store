<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Cart – Energizer Sport</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
      * {
        box-sizing: border-box;
        font-family: "Gill Sans", "Gill Sans MT", Calibri, "Trebuchet MS", sans-serif;
      }

      body {
        background-color: #0d0d0d;
        color: #e0e0e0;
        padding-top: 56px;
      }

      /* ── Navbar active ── */
      .navbar-dark .nav-link.nav-active { color: #28a745 !important; }

      /* ── Page hero ── */
      .page-hero {
        background: linear-gradient(135deg, #0a1a0a, #111);
        border-bottom: 2px solid #28a745;
        padding: 40px 20px 28px;
        text-align: center;
      }
      .page-hero h1 { color: #fff; font-size: 1.9rem; font-weight: 700; margin-bottom: 4px; }
      .page-hero p  { color: #666; margin: 0; }

      /* ── Cart item card ── */
      .cart-item {
        background: #111;
        border: 1px solid #1e1e1e;
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 16px;
        transition: border-color 0.2s;
      }
      .cart-item:hover { border-color: #2a2a2a; }

      .cart-item-img {
        width: 80px;
        height: 80px;
        min-width: 80px;
        background: #0a0a0a;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .cart-item-img img {
        max-width: 76px;
        max-height: 76px;
        object-fit: contain;
      }

      .cart-item-info { flex: 1; min-width: 0; }
      .cart-item-info h6 {
        color: #fff;
        font-size: 0.97rem;
        font-weight: 600;
        margin-bottom: 4px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cart-item-unit { color: #777; font-size: 0.85rem; }

      /* ── Quantity controls ── */
      .qty-controls {
        display: flex;
        align-items: center;
        gap: 0;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .qty-btn {
        background: #1a1a1a;
        border: none;
        color: #e0e0e0;
        width: 34px;
        height: 34px;
        font-size: 1.1rem;
        cursor: pointer;
        line-height: 1;
        transition: background 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .qty-btn:hover { background: #252525; }
      .qty-display {
        background: #111;
        color: #fff;
        width: 38px;
        text-align: center;
        font-size: 0.9rem;
        font-weight: 600;
        border: none;
        border-left: 1px solid #2a2a2a;
        border-right: 1px solid #2a2a2a;
        padding: 0;
        height: 34px;
        line-height: 34px;
      }

      /* ── Line total ── */
      .cart-item-total {
        color: #28a745;
        font-size: 1rem;
        font-weight: 700;
        min-width: 90px;
        text-align: right;
        flex-shrink: 0;
      }

      /* ── Remove button ── */
      .btn-remove {
        background: none;
        border: none;
        color: #444;
        font-size: 1.2rem;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 6px;
        transition: color 0.2s, background 0.2s;
        flex-shrink: 0;
      }
      .btn-remove:hover { color: #e74c3c; background: rgba(231,76,60,0.1); }

      /* ── Order summary ── */
      .order-summary {
        background: #111;
        border: 1px solid #1e1e1e;
        border-radius: 14px;
        padding: 24px;
        position: sticky;
        top: 72px;
      }
      .order-summary h5 {
        color: #fff;
        font-weight: 700;
        margin-bottom: 20px;
        font-size: 1.05rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 0.9rem;
        color: #888;
      }
      .summary-row.total {
        border-top: 1px solid #1e1e1e;
        padding-top: 14px;
        margin-top: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        color: #fff;
      }
      .summary-row.total span:last-child { color: #28a745; }

      .btn-checkout {
        background: #28a745;
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 13px;
        font-size: 1rem;
        font-weight: 600;
        width: 100%;
        cursor: pointer;
        letter-spacing: 0.3px;
        margin-top: 20px;
        transition: background 0.2s, transform 0.1s;
      }
      .btn-checkout:hover  { background: #218838; }
      .btn-checkout:active { transform: scale(0.98); }

      /* ── Empty state ── */
      .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: #444;
      }
      .empty-state .icon { font-size: 3.5rem; margin-bottom: 16px; }
      .empty-state h4 { color: #666; font-size: 1.1rem; margin-bottom: 8px; }
      .empty-state p  { color: #444; font-size: 0.9rem; margin-bottom: 24px; }

      /* ── Responsive ── */
      @media (max-width: 576px) {
        .cart-item { flex-wrap: wrap; }
        .cart-item-total { min-width: auto; }
      }
    </style>
  </head>
  <body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark fixed-top">
      <ul class="navbar-nav">
        <li class="nav-item">
          <img class="navbar-brand" src="Energizer_Sport_Logo.png" alt="Energizer Sport Logo" style="width:100px" />
        </li>
        <li class="nav-item">
          <a class="nav-link" href="home">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="our-products">Our Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="search">Search Product</a>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="buy">Buy</a>
        </li>
        <li class="nav-item active auth-only" style="display:none">
          <a class="nav-link nav-active" href="cart">My Cart <span class="badge badge-success ml-1" id="cartBadge"></span></a>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="orders">My Orders</a>
        </li>
        <li class="nav-item admin-only" style="display:none">
          <a class="nav-link" href="/manage">Admin Panel</a>
        </li>
      </ul>
      <ul class="navbar-nav ml-auto">
        <li class="nav-item auth-only" style="display:none">
          <span class="nav-link" style="color:rgba(255,255,255,0.5);cursor:default;">
            Welcome, <strong id="navUsername" style="color:#fff;"></strong>
          </span>
        </li>
        <li class="nav-item auth-only" style="display:none">
          <a class="nav-link" href="logout">Logout</a>
        </li>
        <li class="nav-item guest-only" style="display:none">
          <a class="nav-link" href="login">Login</a>
        </li>
        <li class="nav-item guest-only" style="display:none">
          <a class="nav-link" href="register">Register</a>
        </li>
      </ul>
    </nav>

    <!-- Page hero -->
    <div class="page-hero">
      <h1>My Cart</h1>
      <p id="heroSub">Loading&hellip;</p>
    </div>

    <!-- Main content -->
    <div class="container mt-4 mb-5">

      <!-- Empty state -->
      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="icon">&#128722;</div>
        <h4>Your cart is empty</h4>
        <p>Browse our products and add items to get started.</p>
        <a href="our-products" class="btn btn-success btn-lg px-5">Shop Now</a>
      </div>

      <!-- Cart content -->
      <div id="cartContent" style="display:none;">
        <div class="row">
          <!-- Items -->
          <div class="col-lg-8">
            <div id="cartItems"></div>
          </div>
          <!-- Summary -->
          <div class="col-lg-4 mt-4 mt-lg-0">
            <div class="order-summary">
              <h5>Order Summary</h5>
              <div class="summary-row">
                <span>Items (<span id="summaryCount">0</span>)</span>
                <span id="summarySubtotal">SAR 0.00</span>
              </div>
              <div class="summary-row total">
                <span>Total</span>
                <span id="summaryTotal">SAR 0.00</span>
              </div>
              <button class="btn-checkout" onclick="checkout()">Proceed to Checkout</button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <script>
      /* ── Cart helpers ── */
      function getCart() {
        return JSON.parse(localStorage.getItem('energizerCart') || '[]');
      }
      function saveCart(c) {
        localStorage.setItem('energizerCart', JSON.stringify(c));
      }
      function updateNavBadge() {
        var count = getCart().reduce(function(s, i) { return s + i.quantity; }, 0);
        var b = document.getElementById('cartBadge');
        if (b) b.textContent = count > 0 ? count : '';
      }
      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      /* ── Render cart ── */
      function renderCart() {
        var cart = getCart();
        var emptyState  = document.getElementById('emptyState');
        var cartContent = document.getElementById('cartContent');
        var heroSub     = document.getElementById('heroSub');

        updateNavBadge();

        if (!cart.length) {
          emptyState.style.display  = 'block';
          cartContent.style.display = 'none';
          heroSub.textContent = '0 items';
          return;
        }

        emptyState.style.display  = 'none';
        cartContent.style.display = 'block';

        var totalQty = cart.reduce(function(s, i) { return s + i.quantity; }, 0);
        heroSub.textContent = totalQty + ' item' + (totalQty !== 1 ? 's' : '');

        var itemsHtml = cart.map(function(item, idx) {
          var lineTotal = (item.price * item.quantity).toFixed(2);
          return '<div class="cart-item">' +
            '<div class="cart-item-img">' +
              '<img src="' + esc(item.image || '') + '" alt="' + esc(item.title) + '" onerror="this.style.opacity=\'0\'" />' +
            '</div>' +
            '<div class="cart-item-info">' +
              '<h6>' + esc(item.title) + '</h6>' +
              '<div class="cart-item-unit">SAR ' + parseFloat(item.price).toFixed(2) + ' each</div>' +
            '</div>' +
            '<div class="qty-controls">' +
              '<button class="qty-btn" onclick="changeQty(' + idx + ', -1)" aria-label="Decrease">&#8722;</button>' +
              '<div class="qty-display">' + item.quantity + '</div>' +
              '<button class="qty-btn" onclick="changeQty(' + idx + ', 1)" aria-label="Increase">&#43;</button>' +
            '</div>' +
            '<div class="cart-item-total">SAR ' + lineTotal + '</div>' +
            '<button class="btn-remove" onclick="removeItem(' + idx + ')" aria-label="Remove item">&#10005;</button>' +
          '</div>';
        }).join('');

        document.getElementById('cartItems').innerHTML = itemsHtml;

        /* Update summary */
        var subtotal = cart.reduce(function(s, i) { return s + (i.price * i.quantity); }, 0);
        document.getElementById('summaryCount').textContent    = totalQty;
        document.getElementById('summarySubtotal').textContent = 'SAR ' + subtotal.toFixed(2);
        document.getElementById('summaryTotal').textContent    = 'SAR ' + subtotal.toFixed(2);
      }

      function changeQty(idx, delta) {
        var cart = getCart();
        cart[idx].quantity = Math.max(1, cart[idx].quantity + delta);
        saveCart(cart);
        renderCart();
      }

      function removeItem(idx) {
        var cart = getCart();
        cart.splice(idx, 1);
        saveCart(cart);
        renderCart();
      }

      function checkout() {
        var cart = getCart();
        if (!cart.length) return;
        var total = cart.reduce(function(s, i) { return s + (i.price * i.quantity); }, 0);
        localStorage.setItem('cartTotal', total.toFixed(2));
        window.location.href = '/buy';
      }

      /* Init */
      renderCart();
    </script>

    <script>
      fetch("/api/session")
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var show = data.loggedIn ? ".auth-only" : ".guest-only";
          document.querySelectorAll(show).forEach(function(el) { el.style.display = ""; });
          if (data.loggedIn && data.username) {
            var el = document.getElementById("navUsername");
            if (el) el.textContent = data.username;
          }
          if (data.role === "admin") {
            document.querySelectorAll(".admin-only").forEach(function(el) { el.style.display = ""; });
          }
        });
    </script>
  </body>
</html>
